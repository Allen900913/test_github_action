name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    # 這裡保留你的自定義類型
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 【修正重點】如果你只想在特定的 Label 貼上時才跑這個 Job
    # 如果不加這行，貼任何標籤（甚至移除標籤）都會觸發這個 Job 執行
    if: |
      github.event_name != 'pull_request' || 
      github.event.action != 'labeled' || 
      github.event.label.name == 'run-ci'
    
    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo "Hello, world! 觸發原因：${{ github.event_name }}"

      - name: 顯示標籤名稱（僅限 PR 標籤觸發時）
        if: github.event.action == 'labeled'
        run: echo "剛剛貼上的標籤是：${{ github.event.label.name }}"
